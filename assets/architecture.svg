<svg xmlns='http://www.w3.org/2000/svg' width='680' height='320' viewBox='0 0 680 320' font-family='-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif'>
  <rect width='680' height='320' rx='14' fill='#ffffff'/>
  <rect width='680' height='320' rx='14' fill='none' stroke='#e7e3f0' stroke-width='1.5'/>
  <text x='28' y='38' font-size='19' font-weight='700' fill='#1a1730'>Oracle — Architecture</text>
  <text x='28' y='60' font-size='13' fill='#6b6486'>from monce import Oracle → DataFrame in, intelligence out</text>

  <!-- DataFrame box -->
  <rect x='40' y='90' width='120' height='60' rx='8' fill='#E3F2FD' stroke='#1565C0' stroke-width='1.5'/>
  <text x='100' y='118' font-size='13' font-weight='600' fill='#1565C0' text-anchor='middle'>DataFrame</text>
  <text x='100' y='135' font-size='11' fill='#1565C0' text-anchor='middle'>N columns</text>

  <!-- Arrow -->
  <path d='M160 120 L200 120' stroke='#6b6486' stroke-width='2' marker-end='url(#arrow)'/>

  <!-- Oracle box -->
  <rect x='200' y='80' width='140' height='80' rx='8' fill='#F3E5F5' stroke='#7B1FA2' stroke-width='1.5'/>
  <text x='270' y='108' font-size='14' font-weight='700' fill='#7B1FA2' text-anchor='middle'>Oracle</text>
  <text x='270' y='126' font-size='11' fill='#7B1FA2' text-anchor='middle'>trains N models</text>
  <text x='270' y='142' font-size='11' fill='#7B1FA2' text-anchor='middle'>in parallel</text>

  <!-- Arrows to Snake models -->
  <path d='M340 100 L400 80' stroke='#6b6486' stroke-width='1.5' marker-end='url(#arrow)'/>
  <path d='M340 120 L400 120' stroke='#6b6486' stroke-width='1.5' marker-end='url(#arrow)'/>
  <path d='M340 140 L400 160' stroke='#6b6486' stroke-width='1.5' marker-end='url(#arrow)'/>

  <!-- Snake models -->
  <rect x='400' y='60' width='130' height='36' rx='6' fill='#E8F5E9' stroke='#2E7D32' stroke-width='1.5'/>
  <text x='465' y='83' font-size='11' font-weight='600' fill='#2E7D32' text-anchor='middle'>Snake(target=col₁)</text>

  <rect x='400' y='102' width='130' height='36' rx='6' fill='#E8F5E9' stroke='#2E7D32' stroke-width='1.5'/>
  <text x='465' y='125' font-size='11' font-weight='600' fill='#2E7D32' text-anchor='middle'>Snake(target=col₂)</text>

  <rect x='400' y='144' width='130' height='36' rx='6' fill='#E8F5E9' stroke='#2E7D32' stroke-width='1.5'/>
  <text x='465' y='167' font-size='11' font-weight='600' fill='#2E7D32' text-anchor='middle'>Snake(target=col_N)</text>

  <!-- Arrow to output -->
  <path d='M530 120 L570 120' stroke='#6b6486' stroke-width='2' marker-end='url(#arrow)'/>

  <!-- Output box -->
  <rect x='570' y='70' width='90' height='100' rx='8' fill='#FFF3E0' stroke='#E65100' stroke-width='1.5'/>
  <text x='615' y='95' font-size='11' font-weight='600' fill='#E65100' text-anchor='middle'>Output</text>
  <text x='615' y='113' font-size='10' fill='#E65100' text-anchor='middle'>.formula()</text>
  <text x='615' y='128' font-size='10' fill='#E65100' text-anchor='middle'>.context()</text>
  <text x='615' y='143' font-size='10' fill='#E65100' text-anchor='middle'>.predict()</text>
  <text x='615' y='158' font-size='10' fill='#E65100' text-anchor='middle'>.audit()</text>

  <!-- Bottom section: features -->
  <rect x='40' y='200' width='600' height='100' rx='8' fill='#FAFAFA' stroke='#e0e0e0' stroke-width='1'/>
  <text x='60' y='225' font-size='12' font-weight='600' fill='#1a1730'>Methods</text>
  <text x='60' y='248' font-size='11' fill='#6b6486'>predict · probability · regression · candle · audit · lookalikes</text>
  <text x='60' y='268' font-size='11' fill='#6b6486'>formula · context · anomaly_score · fill · correlations · ask</text>
  <text x='60' y='288' font-size='11' fill='#6b6486'>lookalikes_labeled · augmented</text>

  <defs>
    <marker id='arrow' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'>
      <path d='M0,0 L8,4 L0,8 Z' fill='#6b6486'/>
    </marker>
  </defs>
</svg>
