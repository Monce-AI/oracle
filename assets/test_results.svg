<svg xmlns='http://www.w3.org/2000/svg' width='560' height='380' viewBox='0 0 560 380' font-family='-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif'>
  <rect width='560' height='380' rx='14' fill='#ffffff'/>
  <rect width='560' height='380' rx='14' fill='none' stroke='#e7e3f0' stroke-width='1.5'/>
  <text x='28' y='38' font-size='19' font-weight='700' fill='#1a1730'>Rule Discovery — 10/10 Passed</text>
  <text x='28' y='58' font-size='13' fill='#6b6486'>Can Oracle find the known rule? Easy → Hard</text>

  <!-- Test bars -->
  <g transform='translate(28, 80)'>
    <!-- #1 -->
    <rect x='0' y='0' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='16' font-size='11' font-weight='600' fill='#1B5E20'>#1 Binary single feature</text>
    <text x='460' y='16' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #2 -->
    <rect x='0' y='28' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='44' font-size='11' font-weight='600' fill='#1B5E20'>#2 Numeric threshold</text>
    <text x='460' y='44' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #3 -->
    <rect x='0' y='56' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='72' font-size='11' font-weight='600' fill='#1B5E20'>#3 Substring match</text>
    <text x='460' y='72' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #4 -->
    <rect x='0' y='84' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='100' font-size='11' font-weight='600' fill='#1B5E20'>#4 Two features combined</text>
    <text x='460' y='100' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #5 -->
    <rect x='0' y='112' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='128' font-size='11' font-weight='600' fill='#1B5E20'>#5 Three numeric classes</text>
    <text x='460' y='128' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #6 -->
    <rect x='0' y='140' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='156' font-size='11' font-weight='600' fill='#1B5E20'>#6 Rule with noise features</text>
    <text x='460' y='156' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #7 -->
    <rect x='0' y='168' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='184' font-size='11' font-weight='600' fill='#1B5E20'>#7 Feature interaction</text>
    <text x='460' y='184' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #8 -->
    <rect x='0' y='196' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='212' font-size='11' font-weight='600' fill='#1B5E20'>#8 Noisy rule (80% accuracy)</text>
    <text x='460' y='212' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #9 -->
    <rect x='0' y='224' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='240' font-size='11' font-weight='600' fill='#1B5E20'>#9 Multi-class categories</text>
    <text x='460' y='240' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>

    <!-- #10 -->
    <rect x='0' y='252' width='490' height='24' rx='4' fill='#C8E6C9'/>
    <text x='8' y='268' font-size='11' font-weight='600' fill='#1B5E20'>#10 Regression pattern</text>
    <text x='460' y='268' font-size='11' font-weight='700' fill='#1B5E20'>PASS</text>
